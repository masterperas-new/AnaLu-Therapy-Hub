<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnaLu Therapy Hub - About</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/app-shell.css" />
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <svg class="app-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" fill="#e6f5f2" stroke="#0f766e" stroke-width="2"/>
          <path d="M32 14v36M22 24c0-6 20-6 20 0M16 34c0 10 8 16 16 16s16-6 16-16" stroke="#0f766e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <rect x="28" y="22" width="8" height="20" rx="2" fill="#0f766e" opacity=".15"/>
          <rect x="22" y="28" width="20" height="8" rx="2" fill="#0f766e" opacity=".15"/>
        </svg>
        <div class="app-header-text">
          <h1 class="app-title">AnaLu Therapy Hub</h1>
          <p class="page-subtitle">About</p>
        </div>
        <div id="user-status" class="user-status hidden">
          <span id="env-badge" class="env-badge"></span>
        </div>
      </header>

      <nav class="main-nav">
        <a href="/index.html">Schedule Hub</a>
        <a href="/appointments.html">Appointment Management</a>
        <a href="/patients.html">Patient Registry</a>
        <a href="/revenue.html" data-therapist-only>Revenue Control</a>
        <a href="/settings.html" data-admin-only>Configuration</a>
        <a href="/users.html" data-admin-only>User Management</a>
        <a href="/about.html" class="nav-right">About</a>
      </nav>

      <section id="login-view" class="card stack">
        <h2>Secure Access</h2>
        <form id="login-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required autocomplete="username" />
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
          <button type="submit">Sign In</button>
        </form>
      </section>

      <section id="app-content" class="hidden stack">
        <section class="card" id="version-card">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
            <h2 style="margin:0">AnaLu Therapy Hub</h2>
            <span id="version-badge" style="background:var(--accent);color:#fff;padding:2px 10px;border-radius:12px;font-size:0.85rem;font-weight:600"></span>
          </div>
          <p id="release-date" style="color:var(--muted);margin-bottom:16px;font-size:0.9rem"></p>
        </section>

        <div id="version-history"></div>
      </section>

      <p id="message" class="message"></p>
    </main>

    <script src="/common.js"></script>
    <script src="/about.js"></script>
  </body>
</html>
