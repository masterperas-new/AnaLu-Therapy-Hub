<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnaLu Therapy Hub - Revenue Control</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/app-shell.css" />
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <svg class="app-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" fill="#e6f5f2" stroke="#0f766e" stroke-width="2"/>
          <path d="M32 14v36M22 24c0-6 20-6 20 0M16 34c0 10 8 16 16 16s16-6 16-16" stroke="#0f766e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <rect x="28" y="22" width="8" height="20" rx="2" fill="#0f766e" opacity=".15"/>
          <rect x="22" y="28" width="20" height="8" rx="2" fill="#0f766e" opacity=".15"/>
        </svg>
        <div class="app-header-text">
          <h1 class="app-title">AnaLu Therapy Hub</h1>
          <p class="page-subtitle">Revenue Control</p>
        </div>
        <div id="user-status" class="user-status hidden"></div>
      </header>

      <nav class="main-nav">
        <a href="/index.html">Schedule Hub</a>
        <a href="/appointments.html">Appointment Management</a>
        <a href="/patients.html">Patient Registry</a>
        <a href="/revenue.html">Revenue Control</a>
        <a href="/settings.html" data-admin-only>Configuration</a>
        <a href="/users.html" data-admin-only>User Management</a>
        <a href="/about.html" class="nav-right">About</a>
      </nav>

      <section id="login-view" class="card stack">
        <h2>Secure Access</h2>
        <form id="login-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required autocomplete="username" />
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
          <button type="submit">Sign In</button>
        </form>
      </section>

      <section id="app-content" class="hidden stack">
        <div id="therapist-filter-wrap" class="hidden" style="margin-bottom:8px">
          <label for="therapistFilter">Therapist</label>
          <select id="therapistFilter">
            <option value="">All Therapists</option>
          </select>
        </div>

        <section class="card">
          <h3 style="margin-bottom:10px">Total Revenue</h3>
          <div id="totalKpis" class="revenue-kpis"></div>
        </section>

        <section class="card">
          <div style="display:flex;gap:8px;align-items:end;flex-wrap:wrap">
            <h3 id="month-label" style="margin:0;flex:1;min-width:120px">Monthly</h3>
            <div style="display:flex;gap:8px;align-items:end">
              <div><label for="monthInput">Month</label><input id="monthInput" type="month" /></div>
              <button id="loadMonth" type="button" style="margin-top:0">Load</button>
            </div>
          </div>
          <div id="monthKpis" class="revenue-kpis" style="margin-top:12px"></div>
        </section>

        <section class="card">
          <h3 id="future-label" style="margin-bottom:10px">Future Revenue</h3>
          <div id="futureKpis" class="revenue-kpis"></div>
          <input id="futureSearch" type="text" placeholder="Search by name, date or notes…" style="margin-top:12px;margin-bottom:10px" />
          <div style="overflow-x:auto">
            <table>
              <thead>
                <tr>
                  <th>Patient</th>
                  <th>Date</th>
                  <th>Fee</th>
                  <th>Notes</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="future-table-body"></tbody>
            </table>
          </div>
          <p id="futureEmpty" class="hidden" style="color:var(--muted);font-size:0.9rem"></p>
          <div id="future-pager" class="pager hidden">
            <button type="button" id="future-pager-prev" class="outline pager-btn">&lsaquo; Prev</button>
            <span id="future-pager-info" class="pager-info"></span>
            <button type="button" id="future-pager-next" class="outline pager-btn">Next &rsaquo;</button>
          </div>
        </section>

        <section class="card">
          <h3 id="owed-label" style="margin-bottom:10px">Outstanding Payments</h3>
          <input id="owedSearch" type="text" placeholder="Search by name, date or notes…" style="margin-bottom:10px" />
          <div style="overflow-x:auto">
            <table>
              <thead>
                <tr>
                  <th>Patient</th>
                  <th>Date</th>
                  <th>Fee</th>
                  <th>Notes</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="owed-table-body"></tbody>
            </table>
          </div>
          <p id="owedEmpty" class="hidden" style="color:var(--muted);font-size:0.9rem"></p>
          <div id="owed-pager" class="pager hidden">
            <button type="button" id="owed-pager-prev" class="outline pager-btn">&lsaquo; Prev</button>
            <span id="owed-pager-info" class="pager-info"></span>
            <button type="button" id="owed-pager-next" class="outline pager-btn">Next &rsaquo;</button>
          </div>
        </section>
      </section>

      <p id="message" class="message"></p>
    </main>

    <script src="/common.js"></script>
    <script src="/revenue.js"></script>
  </body>
</html>
