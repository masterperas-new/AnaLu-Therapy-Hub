<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnaLu Therapy Hub - Scheduling Hub</title>
    <link rel="stylesheet" href="/app-shell.css" />
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <svg class="app-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" fill="#e6f5f2" stroke="#0f766e" stroke-width="2"/>
          <path d="M32 14v36M22 24c0-6 20-6 20 0M16 34c0 10 8 16 16 16s16-6 16-16" stroke="#0f766e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <rect x="28" y="22" width="8" height="20" rx="2" fill="#0f766e" opacity=".15"/>
          <rect x="22" y="28" width="20" height="8" rx="2" fill="#0f766e" opacity=".15"/>
        </svg>
        <div class="app-header-text">
          <h1 class="app-title">AnaLu Therapy Hub</h1>
          <p class="page-subtitle">Schedule Hub</p>
        </div>
        <div id="user-status" class="user-status hidden"></div>
      </header>

      <nav class="main-nav">
        <a href="/index.html">Schedule Hub</a>
        <a href="/appointments.html">Appointment Management</a>
        <a href="/patients.html">Patient Registry</a>
        <a href="/revenue.html">Revenue Control</a>
        <a href="/settings.html" data-admin-only>Configuration</a>
        <a href="/users.html" data-admin-only>User Management</a>
        <a href="/about.html">About</a>
      </nav>

      <section id="login-view" class="card stack">
        <h2>Secure Access</h2>
        <form id="login-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required autocomplete="username" />
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
          <button type="submit">Sign In</button>
        </form>
      </section>

      <section id="app-content" class="hidden stack">
        <section class="card">
          <h2>Calendar</h2>
          <div class="calendar-controls">
            <button id="calendar-prev" type="button" class="outline">Previous</button>
            <button id="calendar-today" type="button" class="outline">Today</button>
            <button id="calendar-next" type="button" class="outline">Next</button>
            <span id="calendar-range" class="calendar-range"></span>
            <select id="calendar-view" class="calendar-view-select" aria-label="Calendar view">
              <option value="week">Week</option>
              <option value="month">Month</option>
            </select>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section class="card">
          <h3>Quick Add Appointment</h3>
          <form id="appointment-form" class="grid-2">
            <div>
              <label for="clientId">Patient</label>
              <select id="clientId" name="clientId" required>
                <option value="" selected disabled>Select a patient</option>
              </select>
            </div>
            <div>
              <label for="appointmentDate">Date and Time</label>
              <input id="appointmentDate" name="appointmentDate" type="datetime-local" required />
            </div>
            <div>
              <label for="address">Address</label>
              <input id="address" name="address" type="text" required />
            </div>
            <div>
              <label for="durationMinutes">Duration (minutes)</label>
              <input id="durationMinutes" name="durationMinutes" type="number" min="1" value="60" required />
            </div>
            <div>
              <label for="feeAmount">Fee (EUR)</label>
              <input id="feeAmount" name="feeAmount" type="number" min="0" step="0.01" />
            </div>
            <div style="grid-column: 1 / -1;">
              <label for="comments">Comments</label>
              <textarea id="comments" name="comments" rows="2"></textarea>
            </div>
            <div style="grid-column: 1 / -1;">
              <button type="submit" class="action-create">Create Appointment</button>
            </div>
          </form>
        </section>
      </section>

      <p id="message" class="message" aria-live="polite"></p>
    </main>

    <script src="/common.js"></script>
    <script src="/schedule.js"></script>
  </body>
</html>
